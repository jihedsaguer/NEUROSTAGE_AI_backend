name: Build and Deploy Backend

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags : |
           ${{ secrets.DOCKERHUB_USERNAME }}/neurostage-backend:latest
                ${{ secrets.DOCKERHUB_USERNAME }}/neurostage-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Deploy on VM
        run: |
          cd ~/neurostage
          echo "${{ github.sha }}" > .last-deploy-app-sha
          docker compose pull app
          docker compose up -d app
      - name: Wait and verify health
        run: |
          echo "Waiting for backend to become healthy..."
          for i in {1..15}; do
            if curl -sf http://localhost/api/auth/dev/verify/healthcheck@test.com > /dev/null 2>&1 || \
               curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -qE "200|301|302|401|404"; then
              echo "Backend is responding."
              exit 0
            fi
            echo "Attempt $i/15 - not ready yet, waiting 3s..."
            sleep 3
          done
          echo "Backend failed health check after 45s"
          docker compose logs app --tail=50
          exit 1

      - name: Cleanup old images
        if: success()
        run: docker image prune -f